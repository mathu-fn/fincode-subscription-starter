name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同じ PR でプッシュが続いたら古いランをキャンセルする
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      # testcontainers が PostgreSQL 16 のイメージを pull するため、Docker が必要。
      # ubuntu-latest ランナーには Docker が同梱されている。
      - name: Run pytest
        env:
          # コンテナの自動クリーンアップ無効化（Ryuk）は CI で安定する
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: uv run pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm run test:run

      - name: Build
        run: npm run build

  openapi:
    name: OpenAPI lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Redocly lint
        run: npx --yes @redocly/cli lint docs/api/openapi.yml
