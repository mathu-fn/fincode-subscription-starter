name: 機能要望
description: 新機能・改善の提案
title: "feat: <一行要約>"
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: 何が困っているか、どんなユースケースがあるか
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案する解決策
      description: 想定する API 変更、画面挙動、データモデルへの影響など
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案

  - type: dropdown
    id: component
    attributes:
      label: 影響するコンポーネント
      multiple: true
      options:
        - backend (FastAPI)
        - frontend (React)
        - alembic migration
        - fincode 連携
        - webhook
        - docs / OpenAPI
        - その他
    validations:
      required: true

  - type: checkboxes
    id: invariants
    attributes:
      label: アーキテクチャ不変条件の確認
      description: 詳細は [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md#アーキテクチャ上の不変条件必読)
      options:
        - label: PAN / CVC をバックエンドに送らない設計を維持できる
        - label: fincode 直接呼び出しは `app/services/fincode/` 以下に閉じる
        - label: 1 ユーザー = 最大 1 アクティブ契約の制約を壊さない
