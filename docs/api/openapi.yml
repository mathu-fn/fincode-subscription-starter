openapi: 3.0.3
info:
  title: fincode Subscription Starter API仕様
  version: 1.0.0
  description: |
    React + FastAPI ベースの fincode サブスクリプションスターター向け REST API 仕様です。

    認証が必要なエンドポイントは JWT Bearer 認証を使用します。
servers:
  - url: http://localhost:8000
    description: ローカル FastAPI サーバー
  - url: https://api.example.com
    description: 本番 API
tags:
  - name: 認証
  - name: サブスクリプション
  - name: カード
  - name: Webhook
paths:
  /api/auth/google:
    post:
      tags: [認証]
      operationId: googleLogin
      summary: Google IDトークンでログインしてJWTを発行
      description: |
        Google Identity Services のボタンが返す ID トークン（credential）を検証し、
        `google_sub` をキーにユーザーを find-or-create してアプリの JWT を発行します。
        検証済みメールアドレスが既存ユーザーと衝突する場合は 409 を返します。
      security: []
      x-rateLimit: 5/min
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
      responses:
        '200':
          description: ログイン成功（初回はユーザーを新規作成）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/ApplicationError'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/logout:
    post:
      tags: [認証]
      operationId: logout
      summary: ログアウト
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ログアウト成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/session-status:
    get:
      tags: [認証]
      operationId: sessionStatus
      summary: 認証状態確認
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 認証状態
          content:
            application/json:
              schema:
                type: object
                required: [authenticated, user]
                properties:
                  authenticated:
                    type: boolean
                  user:
                    type: object
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/user:
    get:
      tags: [認証]
      operationId: getUser
      summary: 認証ユーザー情報取得
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ユーザー情報
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/subscription:
    get:
      tags: [サブスクリプション]
      operationId: getSubscription
      summary: アクティブなサブスクリプション取得
      security:
        - bearerAuth: []
      responses:
        '200':
          description: アクティブ契約または null
          content:
            application/json:
              schema:
                type: object
                nullable: true
                allOf:
                  - $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [サブスクリプション]
      operationId: createSubscription
      summary: サブスクリプション登録
      description: |
        `Idempotency-Key` ヘッダを付与した再試行は安全です。同一キーで再 POST した場合、既に成功した契約があればその契約が返り、fincode 側にも同じ Idempotency-Key が伝搬されるため重複契約は作られません。
      security:
        - bearerAuth: []
      x-rateLimit: 3/min
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: |
            クライアントが生成する重複防止キー（1〜64 文字）。同じユーザ・同じキーでの再送はキーが既に成功裏に消費されていれば元の契約を冪等に返します。未指定の場合はサーバ側で UUID が生成されますが、その場合の再試行は重複契約のリスクがあります。
          schema:
            type: string
            minLength: 1
            maxLength: 64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
      responses:
        '201':
          description: 契約作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/ApplicationError'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags: [サブスクリプション]
      operationId: changeSubscriptionPlan
      summary: サブスクリプションのプラン変更
      description: |
        アクティブな契約を解約せず、同じアプリ側契約行のプラン情報を更新します。有料プラン同士の変更では fincode のサブスクリプション更新 API に `plan_id` を渡します。日割り計算（proration）はこのスターターでは行いません。

        fincode 側の制約により、初回課金済みのサブスクリプション更新が拒否される場合があります。その場合は決済サービス連携エラーとして返されます。
      security:
        - bearerAuth: []
      x-rateLimit: 5/min
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: |
            クライアントが生成する重複防止キー（1〜64 文字）。fincode のサブスクリプション更新または作成に同じ Idempotency-Key を伝搬します。
          schema:
            type: string
            minLength: 1
            maxLength: 64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeSubscriptionPlanRequest'
      responses:
        '200':
          description: プラン変更成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/ApplicationError'
        '422':
          $ref: '#/components/responses/ValidationError'
        '502':
          $ref: '#/components/responses/ApplicationError'
    delete:
      tags: [サブスクリプション]
      operationId: cancelSubscription
      summary: サブスクリプション解約
      description: |
        現在のサブスクリプションの次回以降の請求を停止します。

        有料契約で `current_period_end` が未来の場合、レスポンスは `status: active` と
        `cancel_at_period_end: true` を返し、ユーザーは `current_period_end` まで利用できます。
        フリープラン、または期間末を判断できない契約は即時に `status: cancelled` になります。
      security:
        - bearerAuth: []
      x-rateLimit: 5/min
      responses:
        '200':
          description: 解約成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/ApplicationError'
  /api/subscription/history:
    get:
      tags: [サブスクリプション]
      operationId: getSubscriptionHistory
      summary: 決済履歴取得
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: 決済履歴
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBillingHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/subscription/plans:
    get:
      tags: [サブスクリプション]
      operationId: getPlans
      summary: 有効な fincode プラン一覧取得
      security:
        - bearerAuth: []
      responses:
        '200':
          description: プラン一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/subscription/cards:
    get:
      tags: [カード]
      operationId: getCards
      summary: 登録済みカード一覧取得
      security:
        - bearerAuth: []
      responses:
        '200':
          description: カード一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Card'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [カード]
      operationId: createCard
      summary: fincodeトークンからカード登録
      security:
        - bearerAuth: []
      x-rateLimit: 3/min
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardRequest'
      responses:
        '201':
          description: カード登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/subscription/cards/{card_id}:
    delete:
      tags: [カード]
      operationId: deleteCard
      summary: カード削除
      security:
        - bearerAuth: []
      x-rateLimit: 5/min
      parameters:
        - name: card_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: カード削除成功
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/ApplicationError'
        '409':
          $ref: '#/components/responses/ApplicationError'
  /api/webhooks/fincode:
    post:
      tags: [Webhook]
      operationId: fincodeWebhook
      summary: fincode webhook受信
      description: |
        JWT ではなく fincode の署名検証で保護します。レート制限は課しません（送信元が
        fincode の少数固定 IP のため。重複配信は受信テーブルと upsert の二段冪等で吸収します）。
      security: []
      parameters:
        - name: Fincode-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '204':
          description: イベント受理
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: ペイロード不備（event_id 欠落など。code=invalid_webhook_payload）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "`POST /api/auth/google` で返される JWT。"
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    Unauthorized:
      description: 未認証
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApplicationError'
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    ApplicationError:
      description: アプリケーションエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApplicationError'
  schemas:
    GoogleLoginRequest:
      type: object
      required: [credential]
      properties:
        credential:
          type: string
          minLength: 1
          description: Google Identity Services が返す ID トークン。
    AuthResponse:
      type: object
      required: [access_token, token_type, expires_at, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [bearer]
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required: [id, email, name, created_at]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        created_at:
          type: string
          format: date-time
    Plan:
      type: object
      required: [fincode_plan_id, name, amount, interval]
      properties:
        fincode_plan_id:
          type: string
          example: plan_test_abc123
        name:
          type: string
        amount:
          type: integer
          minimum: 0
        currency:
          type: string
          default: JPY
        interval:
          type: string
          example: month
    CreateSubscriptionRequest:
      type: object
      required: [fincode_plan_id]
      properties:
        fincode_plan_id:
          type: string
          description: |
            契約するプランのID。`"free"` は 0 円フリープラン（アプリ側で合成、fincode 非依存）で、カード不要・ローカル完結で契約される。
        card_id:
          type: integer
          nullable: true
          description: |
            支払いカードID。有料プランでは必須。フリープラン（`fincode_plan_id="free"`）では不要。
    ChangeSubscriptionPlanRequest:
      type: object
      required: [fincode_plan_id]
      properties:
        fincode_plan_id:
          type: string
          description: |
            変更先プランのID。`"free"` は 0 円フリープラン（アプリ側で合成、fincode 非依存）。
        card_id:
          type: integer
          nullable: true
          description: |
            フリープランから有料プランへ変更する場合に必要な支払いカードID。有料プラン同士の変更では既存の fincode サブスクリプションの請求先を維持するため不要。
    Subscription:
      type: object
      required: [id, status, fincode_plan_id, plan_name, plan_amount, cancel_at_period_end, created_at]
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [active, cancelled, unpaid, expired]
        fincode_subscription_id:
          type: string
          nullable: true
        fincode_plan_id:
          type: string
        plan_name:
          type: string
        plan_amount:
          type: integer
        plan_interval:
          type: string
        current_period_end:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: |
            解約予約中は解約申込日時、即時失効済みの場合は解約日時。
        cancel_at_period_end:
          type: boolean
          description: |
            `true` の場合、次回以降の請求は停止済みで、`current_period_end` までは利用可能。
        created_at:
          type: string
          format: date-time
    CreateCardRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          maxLength: 2048
          description: fincode.js が発行したカードトークン。カードのフル情報は送信しないこと。
    Card:
      type: object
      required: [id, brand, last4, exp_month, exp_year, created_at]
      properties:
        id:
          type: integer
        brand:
          type: string
        last4:
          type: string
          minLength: 4
          maxLength: 4
        exp_month:
          type: integer
        exp_year:
          type: integer
        created_at:
          type: string
          format: date-time
    BillingHistoryItem:
      type: object
      required: [id, status, amount, charged_at]
      properties:
        id:
          type: integer
        status:
          type: string
        amount:
          type: integer
        fincode_payment_id:
          type: string
          nullable: true
        charged_at:
          type: string
          format: date-time
    PaginatedBillingHistory:
      type: object
      required: [data, page, per_page, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/BillingHistoryItem'
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
    ApplicationError:
      type: object
      required: [detail]
      properties:
        detail:
          oneOf:
            - type: string
            - type: object
              required: [code, message]
              properties:
                code:
                  type: string
                message:
                  type: string
    ValidationError:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            type: object
            required: [loc, msg, type]
            properties:
              loc:
                type: array
                items:
                  oneOf:
                    - type: string
                    - type: integer
              msg:
                type: string
              type:
                type: string
